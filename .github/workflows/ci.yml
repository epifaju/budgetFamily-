name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: invoice-ai-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build and test
        run: mvn -B verify

  mobile:
    name: Mobile (Jest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: InvoiceAI
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: InvoiceAI/package.json

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test:ci

      - name: Run OCR parser benchmark
        run: npm run test:benchmark
