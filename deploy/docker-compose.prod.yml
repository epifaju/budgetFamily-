# Production : PostgreSQL + API Spring Boot
# Usage : cp deploy/.env.prod.example deploy/.env.prod puis :
#   docker compose -f deploy/docker-compose.prod.yml --env-file deploy/.env.prod up -d --build

services:
  postgres:
    image: postgres:15-alpine
    container_name: invoiceai-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../invoice-ai-backend
      dockerfile: Dockerfile
    container_name: invoiceai-api-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '${API_PORT:-8085}:8085'
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      APP_UPLOADS_DIR: /data/uploads
      APP_UPLOADS_PUBLIC_BASE_URL: ${APP_UPLOADS_PUBLIC_BASE_URL}
      OCR_AI_ENABLED: ${OCR_AI_ENABLED:-false}
      OCR_AI_API_KEY: ${OCR_AI_API_KEY:-}
    volumes:
      - uploads_prod_data:/data/uploads

volumes:
  postgres_prod_data:
  uploads_prod_data:
