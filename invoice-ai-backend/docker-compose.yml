version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: invoiceai-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-invoiceai_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Définissez POSTGRES_PASSWORD dans .env}
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
