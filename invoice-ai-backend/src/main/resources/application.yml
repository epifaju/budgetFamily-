spring:
  application:
    name: invoice-ai-backend

  # Profil « local » → charge application-local.yml (secrets dev, OCR IA, etc.)
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5435/invoiceai_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  uploads:
    directory: ${APP_UPLOADS_DIR:./uploads}
    public-base-url: ${APP_UPLOADS_PUBLIC_BASE_URL:}
    subscription:
    revenuecat-secret-api-key: ${REVENUECAT_SECRET_API_KEY:}
    revenuecat-entitlement: ${REVENUECAT_ENTITLEMENT:premium}
    dev-trust-client-premium: ${SUBSCRIPTION_DEV_TRUST_CLIENT:false}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    server-key: ${FIREBASE_SERVER_KEY:}

jwt:
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:2592000000}

server:
  port: ${SERVER_PORT:8085}
  address: 0.0.0.0 # Écouter sur toutes les interfaces réseau pour permettre l'accès depuis l'appareil mobile
  error:
    include-message: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.invoiceai: DEBUG

# OCR IA : ne pas définir ici (sinon écrase application-local.yml).
# Dev  → application-local.yml (ocr.ai.enabled + ocr.ai.api-key)
# Prod → variables d'environnement OCR_AI_ENABLED, OCR_AI_API_KEY, etc.
